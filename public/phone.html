<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1d20">
  <title>Pip · BetterRobotics</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Pip">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="styles.css">
  <!-- jsQR for the QR-scan-to-reconnect flow. BarcodeDetector isn't on iOS
       Safari yet (2025), so we use the same pure-JS decoder catwatcher uses
       so the same code path covers iOS + Android + desktop browsers. -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script type="module" src="phone.js"></script>
</head>
<body class="phone">
<main class="phone-main">
  <header class="phone-header">
    <div class="phone-brand">Pip</div>
    <span class="phone-status" id="phone-status">
      <span class="dot" id="phone-status-dot"></span>
      <span id="phone-status-text">Pairing…</span>
    </span>
  </header>
  <section class="phone-chat">
    <div id="phone-echo" class="phone-echo" hidden></div>
    <p id="phone-message" class="phone-message">Connecting to your desktop…</p>
  </section>
  <!-- Live camera stream from the desktop (laptop helper today; robot cam
       and other helpers will plug into the same <video> sink). One source
       at a time — desktop chooses for now, picker comes later. -->
  <section class="phone-cam-section" id="phone-cam-section" hidden>
    <video class="phone-cam" id="phone-cam" autoplay playsinline muted></video>
    <div class="hint phone-cam-label" id="phone-cam-label">Camera</div>
  </section>
  <!-- Phone-camera-as-helper: user taps to stream their back camera to the
       paired desktop. Desktop picks it up via peer.onTrack and surfaces it
       in its helpers list the same way the laptop webcam is — Pip can
       observe through it, snapshot it, feed VLM. Hidden until paired. -->
  <section class="phone-share" id="phone-share" hidden>
    <button type="button" id="phone-share-btn" class="phone-share-btn">Share camera</button>
    <video id="phone-share-preview" class="phone-share-preview" playsinline muted hidden></video>
  </section>
  <form id="phone-form" class="phone-form">
    <input id="phone-input" class="phone-input" type="text" autocomplete="off"
           placeholder="Ask Pip…" maxlength="4000" aria-label="Ask Pip" disabled>
  </form>

  <!-- Reconnect surface — shown when there's no pair code in the URL, or
       after a connection drop. Lets the user re-pair without bouncing back
       to the desktop: scan the QR with the phone's own camera. The
       nearby list above the scanner is filled by phone.js when any
       desktop on the same wifi is broadcasting a pair room. -->
  <section class="phone-reconnect" id="phone-reconnect" hidden>
    <div class="phone-reconnect-message" id="phone-reconnect-message"></div>
    <div class="phone-nearby" id="phone-nearby" hidden>
      <p class="phone-nearby-label">On your wifi</p>
      <div id="phone-nearby-list"></div>
      <p id="phone-nearby-status" class="phone-nearby-status" hidden></p>
    </div>
    <button id="phone-scan-btn">Scan QR to connect</button>
    <div class="phone-scanner" id="phone-scanner" hidden>
      <video class="phone-scanner-video" id="phone-scanner-video" playsinline muted></video>
      <div class="phone-scanner-frame"></div>
      <button id="phone-scanner-cancel" class="secondary sm">Cancel</button>
    </div>
    <div class="hint phone-scanner-fallback" id="phone-scanner-fallback" hidden></div>
    <!-- Footer escape hatch for the rare user who wanted the dashboard.
         Hidden unless Web Bluetooth is available (no point sending iPhone
         Safari users to a page they can't use). phone.js unhides. -->
    <a id="phone-dashboard-link" class="phone-dashboard-link" href="./?desktop=1" hidden>Open dashboard view</a>
    <div id="phone-install" class="phone-install" hidden>
      <button id="phone-install-btn" type="button" class="secondary sm">Install Pip on this phone</button>
      <p id="phone-install-hint" class="hint"></p>
    </div>
  </section>
  <section class="phone-scene" id="phone-scene" hidden>
    <div class="phone-scene-label" id="phone-scene-source">Camera</div>
    <div class="phone-scene-text" id="phone-scene-text"></div>
  </section>
  <!-- Panic button — relays `{capability:"stop"}` through the paired
       desktop's BLE session. Always enabled; response surfaces inline so
       the user sees "no robot connected" instead of a silent no-op. -->
  <section class="phone-command" id="phone-command">
    <button id="phone-stop-btn" type="button" class="phone-stop-btn">Stop robot</button>
    <p id="phone-command-status" class="phone-command-status" hidden></p>
  </section>
  <section class="phone-drive" id="phone-drive" hidden>
    <div class="phone-drive-header">
      <div class="label">Drive</div>
      <div class="meta" id="phone-drive-target">No robot connected</div>
    </div>
    <div class="joypad-wrap">
      <div class="joypad" id="phone-joypad"><div class="joypad-knob"></div></div>
      <div class="meta joypad-hint">Drag to drive</div>
    </div>
  </section>

  <!-- Pip asks the user for help when confident enough to act but
       needs human judgment: directional disambiguation, label confirmation,
       "is this the thing you meant?". Modal so it preempts other UI. -->
  <dialog id="phone-ask-dialog" class="ask-dialog">
    <img id="phone-ask-image" class="ask-image" alt="" hidden>
    <p id="phone-ask-question" class="ask-question"></p>
    <div id="phone-ask-options" class="ask-options"></div>
    <form id="phone-ask-free" class="ask-free" hidden>
      <input id="phone-ask-free-input" type="text" placeholder="Type an answer" maxlength="200" autocomplete="off">
      <button type="submit" class="sm">Send</button>
    </form>
    <div class="ask-footer">
      <button type="button" id="phone-ask-skip" class="secondary sm">Skip</button>
    </div>
  </dialog>
</main>
</body>
</html>
