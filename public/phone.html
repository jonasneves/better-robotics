<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1d20">
  <title>Pip · BetterRobotics</title>
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="phone-app.js"></script>
</head>
<body class="phone">
<main class="phone-main">
  <header class="phone-header">
    <div class="phone-brand">Pip</div>
    <span class="phone-status" id="phone-status">
      <span class="dot" id="phone-status-dot"></span>
      <span id="phone-status-text">Pairing…</span>
    </span>
  </header>
  <section class="phone-chat">
    <div id="phone-echo" class="phone-echo" hidden></div>
    <p id="phone-message" class="phone-message">Connecting to your desktop…</p>
  </section>
  <form id="phone-form" class="phone-form">
    <input id="phone-input" class="phone-input" type="text" autocomplete="off"
           placeholder="Ask Pip…" maxlength="300" aria-label="Ask Pip" disabled>
  </form>
  <section class="phone-scene" id="phone-scene" hidden>
    <div class="phone-scene-label" id="phone-scene-source">Camera</div>
    <div class="phone-scene-text" id="phone-scene-text"></div>
  </section>
  <section class="phone-drive" id="phone-drive" hidden>
    <div class="phone-drive-header">
      <div class="label">Drive</div>
      <div class="meta" id="phone-drive-target">No robot connected</div>
    </div>
    <div class="joypad-wrap">
      <div class="joypad" id="phone-joypad"><div class="joypad-knob"></div></div>
      <div class="meta joypad-hint">Drag to drive</div>
    </div>
  </section>
</main>
</body>
</html>
