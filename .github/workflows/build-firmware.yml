name: Build firmware

# Trigger on firmware source changes or when the workflow itself is updated.
# `paths` filter keeps CI from running on its own commits back to public/ —
# publish-* outputs live there, and firmware/** is the authoritative source.
on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - 'Makefile'
      - 'tools/gen-uuids.py'
      - 'tools/check-dram-budget.py'
      - 'protocol/uuids.json'
      - '.github/workflows/build-firmware.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need HEAD~1 for the change-detection diff below. Default
          # depth=1 leaves rev-parse HEAD~1 unable to resolve the
          # parent commit and the diff goes empty (skipping every
          # build, including the ones we wanted to run).
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Generate uuids.h
        # Run from repo root so tools/gen-uuids.py resolves cleanly.
        run: python3 tools/gen-uuids.py

      - name: Detect what changed
        # Decide whether the ESP build needs to run at all. A pure Pi-side
        # commit (firmware/pi_robot/**) shouldn't pay 5+ minutes of IDF
        # compile time. Compare against origin/main's parent — covers
        # workflow_dispatch and pushes that include unrelated paths.
        id: changes
        run: |
          base=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          if git diff --name-only "$base" HEAD | grep -qE '^(firmware/esp32_robot_idf/|protocol/uuids\.json|tools/gen-uuids\.py|\.github/workflows/build-firmware\.yml)'; then
            echo "esp_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "esp_changed=false" >> "$GITHUB_OUTPUT"
            echo "No ESP-side changes — skipping IDF build, will reuse staged bins."
          fi

      - name: Restore IDF build cache
        # Incremental rebuilds: ninja recompiles only what changed when
        # we restore the previous build/ + managed_components/. Cache
        # key is content-hash of every input the build actually depends
        # on, namespaced by github.repository so a repo rename/transfer
        # (which changes the runner workspace path) doesn't restore a
        # build/ with CMake configuration pointing at the old absolute
        # path (fails with "Build directory configured for project X not
        # Y"). restore-keys lets a partial miss still hydrate from the
        # most-recent successful build under the same repo path.
        if: steps.changes.outputs.esp_changed == 'true'
        uses: actions/cache@v4
        with:
          path: |
            firmware/esp32_robot_idf/build
            firmware/esp32_robot_idf/managed_components
          key: idf-build-v5.5.4-${{ github.repository }}-${{ hashFiles('firmware/esp32_robot_idf/main/**', 'firmware/esp32_robot_idf/sdkconfig.defaults', 'firmware/esp32_robot_idf/CMakeLists.txt', 'firmware/esp32_robot_idf/main/idf_component.yml', 'firmware/esp32_robot_idf/patches/**') }}
          restore-keys: |
            idf-build-v5.5.4-${{ github.repository }}-

      - name: Build ESP32 firmware (ESP-IDF)
        if: steps.changes.outputs.esp_changed == 'true'
        # esp-idf-ci-action handles the IDF install + export.sh + idf.py call.
        # Pinned to v5.5.4 to match local dev (`make setup`); the IDF action
        # caches the toolchain so repeat runs are fast. CWD inside the
        # action is path:, hence the bare `idf.py build`.
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32
          path: 'firmware/esp32_robot_idf'
          command: idf.py build

      - name: Static DRAM budget check
        # The classic ESP32-CAM has ~125 KB DRAM. Camera+BLE+WiFi+lwIP all
        # contend for it; a static-DRAM bump that looks innocent in a diff
        # can starve lwIP's pbuf pool at runtime — UDP sends from libpeer
        # then return ENOMEM and WebRTC video silently breaks (we hit this
        # exact failure with mailbox MAILBOX_AD_MAX 384→768 in DRAM-BSS).
        # Failing the build at PR-time beats finding out by re-flashing.
        # Logic lives in tools/check-dram-budget.py — espressif's action
        # wraps `command:` through bash -c, which doesn't pass embedded
        # heredocs cleanly.
        if: steps.changes.outputs.esp_changed == 'true'
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32
          path: 'firmware/esp32_robot_idf'
          command: idf.py size 2>&1 | python3 ../../tools/check-dram-budget.py

      - name: Stage published artifacts
        if: steps.changes.outputs.esp_changed == 'true'
        run: |
          mkdir -p public/firmware/bins
          cp firmware/esp32_robot_idf/build/esp32_robot.bin                     public/firmware/bins/esp32_robot.bin
          cp firmware/esp32_robot_idf/build/bootloader/bootloader.bin           public/firmware/bins/bootloader.bin
          cp firmware/esp32_robot_idf/build/partition_table/partition-table.bin public/firmware/bins/partitions.bin
          cp firmware/esp32_robot_idf/build/ota_data_initial.bin                public/firmware/bins/boot_app0.bin

      - name: Publish Pi firmware + wheels
        run: make publish-pi-firmware

      - name: Commit + push published artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          # main may have moved while we were building. Soft-reset to the
          # latest main on each retry and recommit our staged artifacts
          # on top — avoids rebase merge-conflicts on binary outputs
          # (esp32_robot.bin, version.py, ota-manifest.json) when two CI
          # runs race. Outputs are deterministic from source, so "ours"
          # is always correct: we don't merge two builds, we replace.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            # Drop any prior attempt's commit; keep the artifact files
            # only as a working-tree change. This is a no-op on attempt 1
            # (we're already at HEAD), but on retries it parks our
            # generated files for re-staging on top of fresh origin/main.
            git reset --mixed origin/main
            git add public/firmware/
            if git diff --staged --quiet; then
              echo 'No artifact changes — nothing to publish.'
              exit 0
            fi
            git commit -m 'CI: publish firmware [skip ci]'
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying after sleep…"
            sleep $((attempt * 3))
          done
          echo 'Giving up after 5 retries.'
          exit 1
