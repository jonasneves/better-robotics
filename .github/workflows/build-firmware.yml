name: Build firmware

# Trigger on firmware source changes or when the workflow itself is updated.
# `paths` filter keeps CI from running on its own commits back to public/ —
# publish-* outputs live there, and firmware/** is the authoritative source.
on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - 'Makefile'
      - '.github/workflows/build-firmware.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 Arduino core + NimBLE
        run: |
          arduino-cli core update-index \
            --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          # Pin 3.3.8+ — 3.3.6/3.3.7 silently bypass signed-OTA verification
          # when installSignature() is called before begin() (PR #12425).
          arduino-cli core install esp32:esp32@3.3.8 \
            --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          # NimBLE-Arduino — replaces built-in Bluedroid, reclaims ~58 KB DRAM
          # on classic ESP32 so WiFi gets all 4 RX buffers. Pin to 2.5.0
          # (1.4.x aborts esp_bt_controller_init on arduino-esp32 3.x / IDF 5.x).
          arduino-cli lib install "NimBLE-Arduino"@2.5.0

      - name: Publish ESP32 firmware
        run: make publish-firmware

      - name: Publish Pi firmware + wheels
        run: make publish-pi-firmware

      - name: Commit + push published artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          # main may have moved while we were building. Soft-reset to the
          # latest main on each retry and recommit our staged artifacts
          # on top — avoids rebase merge-conflicts on binary outputs
          # (esp32_robot.bin, version.py, ota-manifest.json) when two CI
          # runs race. Outputs are deterministic from source, so "ours"
          # is always correct: we don't merge two builds, we replace.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            # Drop any prior attempt's commit; keep the artifact files
            # only as a working-tree change. This is a no-op on attempt 1
            # (we're already at HEAD), but on retries it parks our
            # generated files for re-staging on top of fresh origin/main.
            git reset --mixed origin/main
            git add public/firmware/
            if git diff --staged --quiet; then
              echo 'No artifact changes — nothing to publish.'
              exit 0
            fi
            git commit -m 'CI: publish firmware [skip ci]'
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying after sleep…"
            sleep $((attempt * 3))
          done
          echo 'Giving up after 5 retries.'
          exit 1
